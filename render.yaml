services:
  - type: web
    name: class-record-webapp
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: ALLOW_DATA_RESET
        value: false
    disk:
      name: class-record-data
      mountPath: /var/data
      sizeGB: 1
